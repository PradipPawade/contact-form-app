name: CI/CD — Build & Deploy to Azure App Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION:   '20.x'
  FUNC_APP_NAME:  'contactformfunc-pradip'

jobs:

  # ── 1. Backend: build + publish ──────────────────────────────────────────
  build-backend:
    name: Backend — Build & Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publish
        run: dotnet publish --configuration Release --output ./publish

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend/publish
          retention-days: 1

  # ── 2. Function App: build + publish ────────────────────────────────────
  build-functions:
    name: Function App — Build & Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functionapp

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publish
        run: dotnet publish --configuration Release --output ./publish

      - name: Upload function app artifact
        uses: actions/upload-artifact@v4
        with:
          name: functionapp-publish
          path: functionapp/publish
          retention-days: 1

  # ── 3. Frontend: build ───────────────────────────────────────────────────
  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build:prod

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/contact-form-frontend/browser
          retention-days: 1

  # ── 4. Deploy backend to Azure App Service ───────────────────────────────
  deploy-backend:
    name: Deploy Backend → Azure
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ secrets.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package:         ./publish

  # ── 5. Deploy Function App to Azure ─────────────────────────────────────
  deploy-functions:
    name: Deploy Function App → Azure
    runs-on: ubuntu-latest
    needs: build-functions
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download function app artifact
        uses: actions/download-artifact@v4
        with:
          name: functionapp-publish
          path: ./publish

      - name: Deploy to Azure Function App
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ env.FUNC_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNC_PUBLISH_PROFILE }}
          package:         ./publish

  # ── 6. Deploy frontend to Azure App Service ───────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Azure
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package:         ./dist
